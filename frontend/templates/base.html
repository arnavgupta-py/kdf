<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("CRONOS - Urban Mobility") }}</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cronos: {
                dark: '#0f172a',
                primary: '#3b82f6',
                accent: '#10b981',
              }
            }
          }
        }
      }
    </script>
    
    <!-- Alpine.js (CDN) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- HTMX (CDN) -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Custom Styles (if any) -->
    <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased h-screen flex flex-col">
    <!-- Navbar placeholder (if needed, usually in derived templates or included partials) -->
    <header class="bg-cronos-dark text-white p-4 shadow-md flex justify-between items-center">
        <div class="text-xl font-bold tracking-wider">CRONOS</div>
        <nav id="navbar-container">
            <!-- HTMX dynamic target or include -->
        </nav>
    </header>

    <div class="flex-grow flex overflow-hidden">
        <!-- Sidebar placeholder -->
        <aside id="sidebar-container" class="w-64 bg-white border-r shadow-sm overflow-y-auto hidden md:block">
            <!-- HTMX dynamic focus -->
        </aside>

        <!-- Main Content Area -->
        <main class="flex-grow p-6 overflow-y-auto relative">
            {% block content %}
            <!-- Page-specific content injected here -->
            {% endblock %}
        </main>
    </div>

    <!-- Notification system using Alpine -->
    <div x-data="{ show: false, message: '' }" 
         @notify.window="show = true; message = $event.detail; setTimeout(() => show = false, 3000)"
         class="fixed bottom-4 right-4 z-50">
        <div x-show="show" x-transition class="bg-cronos-dark text-white px-6 py-3 rounded-md shadow-lg font-medium" x-text="message"></div>
    </div>
</body>
</html>
