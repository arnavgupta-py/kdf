syntax = "proto3";
package telemetry;

service TelemetryService {
    // Allows Python forecaster to fetch the complete current state
    rpc GetOccupancyMap (OccupancyRequest) returns (OccupancyResponse);
    // Future support: Streaming individual segment updates
}

message OccupancyRequest {
    // Empty request to get full map for now
}

message SegmentState {
    uint32 segment_id = 1;
    float occupancy_ratio = 2; // 0.0 to 1.0 (probabilistic)
    uint32 active_vehicles = 3;
}

message OccupancyResponse {
    int64 timestamp_ms = 1;
    repeated SegmentState segments = 2;
}
